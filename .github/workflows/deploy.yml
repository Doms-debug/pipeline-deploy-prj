name: Demo - build and deploy to Cloud Run

on:
    push:
        branches:
            - 'main'

jobs:
    test-build-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Get code
              uses: actions/checkout@v6

            - name: Install python
              uses: actions/setup-python@v6
              with:
                python-version: '3.10'
            
            - name: Install dependencies
              run: pip install -r requirements.txt

            - name: Run tests
              run: pytest

            - name: Auth to GCP
              uses: google-github-actions/auth@v3
              with:
                credentials_json: '${{ secrets.GCP_CREDENTIALS }}'
            
            - name: Configure Docker
              run: gcloud auth configure-docker europe-central2-docker.pkg.dev

            - name: Build Docker image
              run: docker build -t europe-central2-docker.pkg.dev/prj-cloud-sandbox-repo/github-actions-repo/flask-app:latest .

            - name: Push Docker image
              run: docker push europe-central2-docker.pkg.dev/prj-cloud-sandbox-repo/github-actions-repo/flask-app:latest

            - name: Deploy to Cloud Run
              uses: google-github-actions/deploy-cloudrun@v2
              with:
                service: my-flask-app-test
                region: europe-central2       
                image: europe-central2-docker.pkg.dev/prj-cloud-sandbox-repo/github-actions-repo/flask-app:latest