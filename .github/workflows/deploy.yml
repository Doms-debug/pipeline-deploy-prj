name: Demo - build and deploy to Cloud Run

on:
    push:
        branches:
            - 'main'

jobs:
    test-build-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Get code
              uses: actions/checkout@v6

            - name: Install python
              uses: actions/setup-python@v6
              with:
                python-version: '3.10'
            
            - name: Istall dependencies
              run: pip install -r requirements.txt

            - name: Run tests
              run: pytest

            - name: Auth to GCP
              uses: google-github-actions/auth@v3
              with:
                credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

            - name: Push Docker image
              run: docker push europe-central2-docker.pkg.dev/prj-cloud-sandbox-repo/pipeline-deploy-prj/app:latest

            - name: Wdrożenie do Cloud Run
              uses: google-github-actions/deploy-cloudrun@v2
              with:
                service: my-flask-app-test
                region: europe-central2       
                image: europe-central2-docker.pkg.dev/prj-cloud-sandbox-repo/pipeline-deploy-prj/app:latest